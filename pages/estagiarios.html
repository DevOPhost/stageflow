<!doctype html>
<html lang="pt-BR" data-theme="dark" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Estagiários | StageFlow</title>
  <link rel="icon" href="../assets/images/logo-stageflow.svg?v=14" type="image/svg+xml">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://unpkg.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/main.css?v=16" rel="stylesheet">
  <link href="../assets/css/components.css?v=14" rel="stylesheet">
  <link href="../assets/css/pages/forms.css?v=12" rel="stylesheet">
  <style id="stageflow-critical-visible">body{opacity:1!important;transform:none!important;visibility:visible!important}.main-content{visibility:visible!important}.app-shell{min-height:100vh}</style></head>
<body data-page="estagiarios">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-start">
          <button class="icon-button sidebar-toggle" type="button" data-sidebar-toggle aria-label="Abrir menu">
            <i data-lucide="menu"></i>
          </button>
          <div>
            <span class="page-kicker">Cadastro acadêmico</span>
            <h1>Estagiários</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" type="button" data-theme-toggle data-bs-toggle="tooltip" title="Alternar tema">
            <i data-lucide="sun-moon"></i>
          </button>
          <div class="profile-chip">
            <span id="topbarAvatar" class="avatar">SF</span>
            <div>
              <span id="topbarUserName">StageFlow</span>
              <small id="topbarUserRole">Coordenação</small>
            </div>
          </div>
        </div>
      </header>

      <section>
        <div class="toolbar">
          <div class="toolbar-group">
            <label class="search-control" for="studentSearch">
              <i data-lucide="search"></i>
              <input id="studentSearch" class="form-control" type="search" placeholder="Pesquisar por nome, matrícula, curso ou e-mail">
            </label>
            <select id="studentStatusFilter" class="form-select" aria-label="Filtrar por status">
              <option value="">Todos os status</option>
              <option value="Ativo">Ativo</option>
              <option value="Em acompanhamento">Em acompanhamento</option>
              <option value="Pendente">Pendente</option>
              <option value="Finalizado">Finalizado</option>
            </select>
            <select id="studentSort" class="form-select" aria-label="Ordenar estagiários">
              <option value="nome">Ordenar por nome</option>
              <option value="matricula">Ordenar por matrícula</option>
              <option value="curso">Ordenar por curso</option>
              <option value="status">Ordenar por status</option>
            </select>
          </div>
          <button class="btn btn-primary" type="button" id="newStudentButton">
            <i data-lucide="plus"></i> Novo estagiário
          </button>
        </div>

        <div class="data-panel">
          <div id="studentsTableWrap" class="table-responsive" aria-live="polite" aria-busy="true">
            <div class="empty-state">
              <div class="empty-icon"><i data-lucide="loader-circle"></i></div>
              <h2>Carregando cadastros</h2>
              <p>Aguarde enquanto os dados locais são preparados.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <form class="modal-content" id="studentForm">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="studentModalTitle">Novo estagiário</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" name="id">
          <div class="row g-3">
            <div class="col-md-7">
              <label class="form-label" for="studentName">Nome</label>
              <input id="studentName" class="form-control" name="nome" required maxlength="90">
            </div>
            <div class="col-md-5">
              <label class="form-label" for="studentRegistration">Matrícula</label>
              <input id="studentRegistration" class="form-control" name="matricula" required minlength="3" maxlength="24" pattern="[A-Za-z0-9._/-]{3,24}" title="Use letras, números, pontos, barras, hífens ou sublinhados" autocomplete="off" autocapitalize="none" spellcheck="false">
            </div>
            <div class="col-md-7">
              <label class="form-label" for="studentCourse">Curso</label>
              <input id="studentCourse" class="form-control" name="curso" required maxlength="90">
            </div>
            <div class="col-md-5">
              <label class="form-label" for="studentStatus">Status</label>
              <select id="studentStatus" class="form-select" name="status" required>
                <option value="Ativo">Ativo</option>
                <option value="Em acompanhamento">Em acompanhamento</option>
                <option value="Pendente">Pendente</option>
                <option value="Finalizado">Finalizado</option>
              </select>
            </div>
            <div class="col-md-7">
              <label class="form-label" for="studentEmail">Email</label>
              <input id="studentEmail" class="form-control" name="email" type="email" required maxlength="90" autocomplete="off" autocapitalize="none" spellcheck="false">
            </div>
            <div class="col-md-5">
              <label class="form-label" for="studentPhone">Telefone</label>
              <input id="studentPhone" class="form-control" name="telefone" type="tel" required maxlength="24" autocomplete="off">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="studentSubmitButton">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toastRoot" class="app-toast-root" aria-live="polite" aria-atomic="true"></div>

  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="confirmModalTitle">Confirmar ação</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <p id="confirmModalMessage" class="mb-0 muted">Deseja continuar?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" id="confirmModalCancel" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="confirmModalConfirm">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../assets/js/pages/estagiarios.js?v=17"></script>
  <script src="../assets/js/rescuePanel.js?v=20"></script>
</body>
</html>
